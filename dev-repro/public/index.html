<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OnePG BHK Repro</title>
  </head>
  <body style="font-family:system-ui,Arial;line-height:1.4;padding:24px;">
    <h1>OnePG BHK + OAuth Repro</h1>
    <p>This page loads a simulated widget script and provides a button to open an OAuth popup.</p>

    <button id="open-oauth">Open OAuth Popup</button>

    <script>
      // Simulate site config - comment out to reproduce missing keys
      // window.__BHK_CONFIG__ = { publicKey: 'pk_test_123', merchantId: 'm_abc' };

      // Load the simulated widget script
      const s = document.createElement('script');
      s.src = '/content.ts-Bi1StZeJ.js';
      document.head.appendChild(s);

      document.getElementById('open-oauth').addEventListener('click', () => {
        window.open('/login.html?token=SIMULATED&social=google', 'onepg-oauth', 'width=600,height=700');
      });

      // Listen for postMessage from popup
      window.addEventListener('message', (ev) => {
        console.log('Main window received message:', ev.data);
      });
    </script>
  </body>
</html>
