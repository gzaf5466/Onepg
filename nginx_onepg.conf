# Nginx Production Configuration for OnePG (onepg.co.in)

server {
    listen 80;
    listen [::]:80;
    server_name onepg.co.in www.onepg.co.in 200.97.174.138;
    return 307 https://$host$request_uri; # 307 preserves POST method & body during HTTP -> HTTPS redirect
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name onepg.co.in www.onepg.co.in;

    ssl_certificate /etc/letsencrypt/live/onepg.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onepg.co.in/privkey.pem;

    root /var/www/onepg;
    index index.html;

    add_header Cross-Origin-Opener-Policy "unsafe-none" always;

    # 1. Reverse Proxy API requests to Express Backend (Port 5000)
    location /api {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Microsoft Entra ID Publisher Domain Verification
    location /.well-known/ {
        alias /var/www/onepg/.well-known/;
        try_files $uri $uri/ =404;
    }

    # 3. Frontend SPA Routing Catch-All
    location / {
        try_files $uri $uri/ /index.html;
    }
}
