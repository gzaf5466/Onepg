<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating | OnePG</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 32px;
            max-width: 400px;
        }
        .logo {
            height: 36px;
            width: auto;
            margin-bottom: 24px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 87, 34, 0.15);
            border-top-color: #FF5722;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #f4f4f5;
        }
        p {
            font-size: 13px;
            color: #a1a1aa;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/logo.svg" alt="OnePG" class="logo" />
        <div class="spinner"></div>
        <h2>Authenticating...</h2>
        <p>Please wait while we complete your sign-in request.</p>
    </div>
    <script>
        (function() {
            // If opened inside a popup window (e.g., OAuth popup flow)
            if (window.opener && window.opener !== window) {
                const params = new URLSearchParams(window.location.search || window.location.hash.substring(1));
                const token = params.get('token') || params.get('access_token');
                const social = params.get('social');
                if (token && !window.opener.closed) {
                    try {
                        window.opener.postMessage({ type: 'ONEPG_OAUTH_SUCCESS', token, social }, window.location.origin);
                        window.close();
                        return;
                    } catch (e) {
                        console.error('Error posting message to opener:', e);
                    }
                }
            }

            // For full-page redirect flow (e.g. MSAL loginRedirect or OAuth return),
            // forward search and hash parameters to /login so the main React app (main.jsx & LoginPage.jsx) can process it.
            const targetPath = '/login' + window.location.search + window.location.hash;
            window.location.replace(targetPath);
        })();
    </script>
</body>
</html>
